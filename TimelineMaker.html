<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Editor</title>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}

.top{
  position:sticky;top:0;background:white;padding:10px;z-index:10;
}

.card{
  background:white;margin:10px;padding:10px;border-radius:10px;
  cursor:pointer;
}

button{margin:5px;padding:8px;}

#editor{
  position:fixed;top:10%;left:5%;right:5%;
  background:white;padding:10px;border-radius:10px;
  display:none;z-index:100;
}

#map{height:200px;margin-top:10px;}
#out{word-break:break-all;background:#eee;padding:10px;}
</style>
</head>

<body>

<div class="top">
  <button onclick="addCard('activity')">➕ 観光</button>
  <button onclick="addCard('move')">➕ 移動</button>
  <button onclick="generate()">URL生成</button>
  <button onclick="copy()">コピー</button>
  <button onclick="makeQR()">QR</button>
</div>

<div id="list"></div>

<div id="editor">
  <input id="title" placeholder="タイトル"><br>
  <input id="start" placeholder="08:30">
  <input id="end" placeholder="10:00"><br>
  <textarea id="todos" placeholder="やること"></textarea>
  <div id="map"></div>
  <button onclick="saveEdit()">保存</button>
</div>

<div id="out"></div>
<canvas id="qr"></canvas>

<script>
// ===== データ =====
let data=JSON.parse(localStorage.getItem("timeline")||'{"cards":[]}');
let editingIndex=null;
let map,marker;

// ===== 描画 =====
function render(){
  list.innerHTML="";
  data.cards.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`${c.start}-${c.end} ${c.title||c.mode}`;
    el.onclick=()=>edit(i);
    list.appendChild(el);
  });
  saveLocal();
}

// ===== 保存 =====
function saveLocal(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

// ===== 追加 =====
function addCard(type){
  const c={
    type:type,
    start:"09:00",
    end:"10:00"
  };
  if(type==="activity") c.title="観光";
  if(type==="move") c.mode="car";
  data.cards.push(c);
  render();
}

// ===== 編集 =====
function edit(i){
  editingIndex=i;
  const c=data.cards[i];

  editor.style.display="block";
  title.value=c.title||"";
  start.value=c.start;
  end.value=c.end;
  todos.value=(c.todos||[]).join(",");

  initMap(c);
}

// ===== 地図 =====
function initMap(c){
  if(map) map.remove();

  map=L.map("map").setView([c.lat||35, c.lng||135], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  if(c.lat){
    marker=L.marker([c.lat,c.lng]).addTo(map);
  }

  map.on("click",e=>{
    const {lat,lng}=e.latlng;
    if(marker) marker.remove();
    marker=L.marker([lat,lng]).addTo(map);

    data.cards[editingIndex].lat=lat;
    data.cards[editingIndex].lng=lng;
  });
}

// ===== 保存 =====
function saveEdit(){
  const c=data.cards[editingIndex];
  c.title=title.value;
  c.start=start.value;
  c.end=end.value;
  c.todos=todos.value.split(",");

  editor.style.display="none";
  render();
}

// ===== D&D =====
new Sortable(list,{
  animation:150,
  onEnd:e=>{
    const item=data.cards.splice(e.oldIndex,1)[0];
    data.cards.splice(e.newIndex,0,item);
    saveLocal();
  }
});

// ===== URL生成 =====
let url="";
function generate(){
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  url="https://ntaokshaiyoa-afk.github.io/SimilarBird/?d="+d;
  out.innerText=url;
}

// ===== コピー =====
function copy(){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url);
  }
}

// ===== QR =====
function makeQR(){
  QRCode.toCanvas(qr,url);
}

// ===== 初期描画 =====
render();
</script>

</body>
</html>

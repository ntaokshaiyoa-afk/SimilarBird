<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
.top{position:sticky;top:0;background:white;padding:10px;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
#editor{position:fixed;top:10%;left:5%;right:5%;background:white;padding:10px;display:none;}
#map{height:200px;}
#out{background:#eee;padding:10px;word-break:break-all;user-select:all;}
</style>
</head>

<body>

<div class="top">
  <button onclick="addDay()">＋日</button>
  <button onclick="addCard('a')">＋観光</button>
  <button onclick="addCard('m')">＋移動</button>
  <button onclick="generate()">URL</button>
  <button onclick="copy()">コピー</button>
  <button onclick="qr()">QR</button>
</div>

<div id="list"></div>

<div id="editor">
  <input id="title"><br>
  <input id="start">
  <input id="end"><br>

  <select id="mode">
    <option value="car">🚗</option>
    <option value="train">🚃</option>
    <option value="walk">🚶</option>
  </select>

  <div id="map"></div>
  <button onclick="saveEdit()">保存</button>
</div>

<div id="out"></div>
<canvas id="qr"></canvas>

<script>
const list = document.getElementById("list");

// ===== データ =====
let data = JSON.parse(localStorage.getItem("t")||'{"d":[{"dt":"1日目","c":[]}]}');
let di=0, ei=null;
let map,marker;

// ===== 描画 =====
function render(){
  list.innerHTML="";
  const cards=data.d[di].c;

  cards.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerText=`${icon(c)} ${c.s}-${c.e}`;
    el.onclick=()=>edit(i);
    list.appendChild(el);
  });

  new Sortable(list,{
    animation:150,
    onEnd:e=>{
      const item=cards.splice(e.oldIndex,1)[0];
      cards.splice(e.newIndex,0,item);
      save();
    }
  });
}

// ===== アイコン =====
function icon(c){
  if(c.t==="a") return "🎯";
  if(c.m==="car") return "🚗";
  if(c.m==="train") return "🚃";
  if(c.m==="walk") return "🚶";
}

// ===== 保存 =====
function save(){
  localStorage.setItem("t",JSON.stringify(data));
}

// ===== 追加 =====
function addDay(){
  data.d.push({dt:"日"+(data.d.length+1),c:[]});
  di=data.d.length-1;
  render();
}

function addCard(type){
  const c={t:type,s:"09:00",e:"10:00"};
  if(type==="m") c.m="car";
  data.d[di].c.push(c);
  render();
}

// ===== 編集 =====
function edit(i){
  ei=i;
  const c=data.d[di].c[i];

  editor.style.display="block";

  title.value=c.tt||"";
  start.value=c.s;
  end.value=c.e;
  mode.value=c.m||"car";

  initMap(c);
}

// ===== 地図 =====
function initMap(c){
  if(map) map.remove();

  map=L.map("map").setView([c.la||35,c.lo||135],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on("click",e=>{
    let lat=+e.latlng.lat.toFixed(4);
    let lng=+e.latlng.lng.toFixed(4);

    if(marker) marker.remove();
    marker=L.marker([lat,lng]).addTo(map);

    const card=data.d[di].c[ei];
    card.la=lat;
    card.lo=lng;
  });
}

// ===== 保存 =====
function saveEdit(){
  const c=data.d[di].c[ei];

  c.tt=title.value;
  c.s=start.value;
  c.e=end.value;
  c.m=mode.value;

  editor.style.display="none";
  render();
}

// ===== URL =====
let url="";
function generate(){
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  url="https://ntaokshaiyoa-afk.github.io/SimilarBird/?d="+d;
  out.innerText=url;
}

// ===== コピー（完全対応） =====
function copy(){
  const i=document.createElement("input");
  i.value=url;
  document.body.appendChild(i);
  i.select();
  document.execCommand("copy");
  document.body.removeChild(i);
  alert("コピーOK");
}

// ===== QR =====
function qr(){
  QRCode.toCanvas(document.getElementById("qr"),url);
}

render();
</script>
</body>
</html>

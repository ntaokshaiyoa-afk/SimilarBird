<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Timeline Maker</title>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<style>
body{font-family:sans-serif;padding:20px;}
textarea{width:100%;height:280px;}
button{margin-top:10px;padding:10px;}
#out{margin-top:10px;word-break:break-all;}
</style>
</head>
<body>

<h2>行程JSON</h2>

<textarea id="jsonInput">
{
  "cards": [
    {
      "type": "activity",
      "title": "志摩スペイン村",
      "start": "08:30",
      "end": "10:00",
      "todos": ["パレード","昼ごはん"],
      "lat": 34.34,
      "lng": 136.83
    },
    {
      "type": "move",
      "mode": "car",
      "start": "10:00",
      "end": "10:30",
      "duration": "30分",
      "lat": 34.48,
      "lng": 136.84,
      "route": [
        [34.34,136.83],
        [34.40,136.82],
        [34.48,136.84]
      ]
    },
    {
      "type": "move",
      "mode": "train",
      "start": "10:30",
      "end": "11:30",
      "steps": [
        {"line":"近鉄志摩線","from":"鵜方","to":"鳥羽","depart":"10:35","arrive":"11:10"}
      ]
    },
    {
      "type": "activity",
      "title": "鳥羽水族館",
      "start": "11:30",
      "end": "13:00",
      "todos": ["ジュゴン","ペンギン"],
      "lat": 34.48,
      "lng": 136.84
    }
  ]
}
</textarea>

<br>
<button onclick="gen()">URL生成</button>
<button onclick="copy()">コピー</button>

<div id="out"></div>

<script>
const BASE="https://ntaokshaiyoa-afk.github.io/SimilarBird/";
let url="";

function gen(){
  const json=document.getElementById("jsonInput").value;
  const d=LZString.compressToEncodedURIComponent(json);
  url=BASE+"?d="+d;
  out.innerText=url;
}

function copy(){
  navigator.clipboard.writeText(url).then(()=>alert("コピーOK"));
}
</script>

</body>
</html>

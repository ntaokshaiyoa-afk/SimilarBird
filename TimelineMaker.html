<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Timeline Maker</title>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{font-family:sans-serif;padding:20px;}
textarea{width:100%;height:320px;}
button{margin-top:10px;padding:10px;}
#out{
  margin-top:10px;
  word-break:break-all;
  user-select:all;
  padding:10px;
  background:#f0f0f0;
}
#qr{margin-top:20px;}
</style>
</head>

<body>

<h2>行程JSON</h2>

<textarea id="jsonInput">
{
  "cards": [
    {
      "type": "activity",
      "title": "志摩スペイン村",
      "start": "08:30",
      "end": "10:00",
      "todos": ["パレード","昼ごはん"],
      "lat": 34.34,
      "lng": 136.83
    },
    {
      "type": "move",
      "mode": "car",
      "start": "10:00",
      "end": "10:30",
      "duration": "30分",
      "lat": 34.48,
      "lng": 136.84,
      "route": [[34.34,136.83],[34.48,136.84]]
    },
    {
      "type": "move",
      "mode": "train",
      "start": "10:30",
      "end": "11:30",
      "lat": 34.48,
      "lng": 136.84,
      "steps": [
        {"line":"近鉄志摩線","from":"鵜方","to":"鳥羽","depart":"10:35","arrive":"11:10"}
      ]
    },
    {
      "type": "activity",
      "title": "鳥羽水族館",
      "start": "11:30",
      "end": "13:00",
      "todos": ["ジュゴン","ペンギン"],
      "lat": 34.48,
      "lng": 136.84
    }
  ]
}
</textarea>

<br>
<button onclick="generate()">URL生成</button>
<button onclick="copy()">コピー</button>
<button onclick="makeQR()">QR生成</button>

<div id="out"></div>
<canvas id="qr"></canvas>

<script>
const BASE="https://ntaokshaiyoa-afk.github.io/SimilarBird/";
let url="";

// ===== URL生成 =====
function generate(){
  const json=document.getElementById("jsonInput").value;
  const d=LZString.compressToEncodedURIComponent(json);
  url=BASE+"?d="+d;

  const out=document.getElementById("out");
  out.innerText=url;

  // 自動選択（iPhone対策）
  const range=document.createRange();
  range.selectNodeContents(out);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ===== コピー（完全版） =====
function copy(){
  if(!url) return alert("先に生成");

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url)
      .then(()=>alert("コピーしました"))
      .catch(()=>fallbackCopy());
  }else{
    fallbackCopy();
  }
}

function fallbackCopy(){
  const t=document.createElement("textarea");
  t.value=url;
  t.style.position="fixed";
  t.style.top="0";
  document.body.appendChild(t);
  t.select();

  try{
    document.execCommand("copy");
    alert("コピーしました");
  }catch{
    alert("コピー失敗");
  }

  document.body.removeChild(t);
}

// ===== QR =====
function makeQR(){
  if(!url) return alert("先に生成");

  QRCode.toCanvas(document.getElementById("qr"), url, {
    width: 200
  });
}
</script>

</body>
</html>

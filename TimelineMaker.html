<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}
.top{position:sticky;top:0;background:white;padding:10px;}
.card{background:white;margin:10px;padding:12px;border-radius:12px;}
#editor{position:fixed;top:5%;left:5%;right:5%;background:white;padding:12px;border-radius:12px;display:none;}
#map{height:200px;margin-top:10px;}
#debug{position:fixed;bottom:0;background:#000;color:#0f0;font-size:10px;width:100%;max-height:120px;overflow:auto;}
</style>
</head>

<body>

<div class="top">
<button onclick="addCard('m')">＋移動</button>
<button onclick="generate()">URL</button>
</div>

<div id="list"></div>

<div id="editor">
<input id="title">
<div id="map"></div>
<div id="stationInfo"></div>
<button onclick="saveEdit()">保存</button>
</div>

<div id="debug"></div>

<script>
// ===== ログ =====
function log(...a){
  console.log(...a);
  debug.innerText += a.join(" ")+"\\n";
}

// ===== 状態 =====
let data={d:[{dt:"1日目",c:[]}]};
let di=0, ei=null;
let map, marker;
let stations=[];

fetch("./stations.json").then(r=>r.json()).then(s=>{
  stations=s;
  log("stations loaded:", stations.length);
});

// ===== 最寄駅 =====
function nearest(lat,lng){
  let best=null,dist=999;
  stations.forEach(s=>{
    const d=(s.lat-lat)**2+(s.lng-lng)**2;
    if(d<dist){dist=d;best=s;}
  });
  return best;
}

// ===== 路線選択 =====
function chooseLine(prev, st){
  if(!st.lines) return null;
  if(prev && prev.line){
    const m=st.lines.find(l=>l===prev.line);
    if(m){ log("match line:",m); return m; }
  }
  log("fallback line:", st.lines[0]);
  return st.lines[0];
}

// ===== 描画 =====
function render(){
  list.innerHTML="";
  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerText=c.station||"未設定";
    el.onclick=()=>edit(i);
    list.appendChild(el);
  });
}

// ===== 追加 =====
function addCard(){
  data.d[di].c.push({});
  render();
}

// ===== 編集 =====
function edit(i){
  ei=i;
  const c=data.d[di].c[i];
  editor.style.display="block";

  initMap(c);
}

// ===== 地図 =====
function initMap(c){
  if(map) map.remove();

  map=L.map("map").setView([35,139],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on("click",e=>{
    const st=nearest(e.latlng.lat,e.latlng.lng);
    log("clicked station:", st.name);

    if(marker) marker.remove();
    marker=L.marker([st.lat,st.lng]).addTo(map);

    const card=data.d[di].c[ei];
    const prev=data.d[di].c[ei-1];

    card.la=st.lat;
    card.lo=st.lng;
    card.station=st.name;
    card.line=chooseLine(prev,st);

    stationInfo.innerText=`${st.name} / ${card.line}`;
  });
}

// ===== 保存 =====
function saveEdit(){
  editor.style.display="none";
  render();
}

// ===== URL =====
function generate(){
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  const url="https://ntaokshaiyoa-afk.github.io/SimilarBird/?d="+d;
  log("URL:", url);
}

render();
</script>

</body>
</html>

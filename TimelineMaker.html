<!DOCTYPE html>
<html>
<body>

<textarea id="json" rows="10" cols="40">
{
  "cards": [
    {
      "type": "activity",
      "title": "志摩スペイン村",
      "start": "08:30",
      "end": "10:00",
      "todos": ["パレード", "昼ごはん"],
      "mapLink": "https://maps.google.com"
    },
    {
      "type": "move",
      "mode": "car",
      "start": "10:00",
      "end": "10:30",
      "duration": "30分",
      "navLink": "https://www.google.com/maps/dir/?api=1&destination=34.48,136.84"
    }
  ]
}
</textarea>

<br><br>
<button onclick="gen()">URL生成</button>

<p id="out"></p>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<script>
function gen() {
  const json = document.getElementById("json").value;

  const compressed = LZString.compressToEncodedURIComponent(json);

  const url = location.origin + "/?d=" + compressed;

  document.getElementById("out").innerText = url;
}
</script>

</body>
</html>

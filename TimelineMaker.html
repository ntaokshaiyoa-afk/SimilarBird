<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timeline Maker</title>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body { font-family:sans-serif; padding:20px; }
textarea { width:100%; height:200px; }
button { margin-top:10px; padding:10px; }
#out { margin-top:10px; word-break:break-all; }
</style>
</head>

<body>

<h2>行程JSON</h2>

<textarea id="jsonInput">
{
  "cards": [
    {
      "type": "activity",
      "title": "志摩スペイン村",
      "start": "08:30",
      "end": "10:00",
      "todos": ["パレード", "昼ごはん"],
      "lat": 34.34,
      "lng": 136.83
    },
    {
      "type": "move",
      "mode": "car",
      "start": "10:00",
      "end": "10:30",
      "duration": "30分",
      "lat": 34.48,
      "lng": 136.84
    }
  ]
}
</textarea>

<br>
<button onclick="generate()">URL生成</button>
<button onclick="copyUrl()">コピー</button>

<div id="out"></div>

<script>
const BASE_URL = "https://ユーザー名.github.io/SimilarBird/";

let currentUrl = "";

function generate() {
  try {
    const json = document.getElementById("jsonInput").value;

    const compressed = LZString.compressToEncodedURIComponent(json);

    currentUrl = BASE_URL + "?d=" + compressed;

    document.getElementById("out").innerText = currentUrl;
  } catch (e) {
    alert("生成失敗");
  }
}

function copyUrl() {
  if (!currentUrl) {
    alert("先にURL生成してください");
    return;
  }

  navigator.clipboard.writeText(currentUrl)
    .then(() => alert("コピーしました！"))
    .catch(() => alert("コピー失敗"));
}
</script>

</body>
</html>

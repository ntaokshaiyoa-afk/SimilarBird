<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimilarBird</title>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}

.top{
  position:sticky;top:0;background:white;
  padding:10px;z-index:1000;
}

.card{
  background:white;margin:10px;padding:10px;
  border-radius:10px;
}

.map{
  height:160px;
  margin-top:10px;
  border-radius:8px;
}

.leaflet-container{z-index:0!important;}

.next{
  position:fixed;bottom:0;width:100%;
  background:#007aff;color:white;
  padding:10px;z-index:1000;
}
</style>
</head>

<body>

<div class="top">
  <div id="dayTabs"></div>
</div>

<div id="list"></div>
<div id="next" class="next"></div>

<script>
// ===== URL読み込み =====
const params = new URLSearchParams(location.search);
const raw = params.get("d");

let data;

try{
  data = JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
}catch{
  document.body.innerHTML="データ読み込みエラー";
  throw "";
}

// ===== ガード =====
if(!data.days){
  document.body.innerHTML="旧フォーマットです";
  throw "";
}

let dayIndex=0;

// ===== アイコン =====
function icon(c){
  if(c.type==="activity") return "🎯";
  if(c.mode==="car") return "🚗";
  if(c.mode==="train") return "🚃";
  if(c.mode==="walk") return "🚶";
  return "📍";
}

// ===== タブ =====
function renderTabs(){
  dayTabs.innerHTML="";
  data.days.forEach((d,i)=>{
    const b=document.createElement("button");
    b.innerText=d.date;
    b.onclick=()=>{dayIndex=i;render();}
    dayTabs.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  renderTabs();

  list.innerHTML="";
  const cards=data.days[dayIndex].cards;

  cards.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <b>${icon(c)} ${c.start}-${c.end}</b><br>
      ${c.title || c.mode || ""}
      ${c.lat ? `<div id="map-${i}" class="map"></div>` : ""}
    `;

    el.onclick=()=>{
      if(c.lat) initMap(i,c);
    };

    list.appendChild(el);
  });

  updateNext();
}

// ===== 地図 =====
function initMap(i,c){
  const div=document.getElementById(`map-${i}`);
  if(div._map) return;

  const map=L.map(div).setView([c.lat,c.lng],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([c.lat,c.lng]).addTo(map);

  if(c.route){
    L.polyline(c.route).addTo(map);
  }

  div._map=map;
}

// ===== 次 =====
function updateNext(){
  const next=data.days[dayIndex].cards[0];
  nextEl.innerText = next ? `次: ${next.start} ${next.title||next.mode}` : "";
}

const nextEl=document.getElementById("next");

// ===== 初期描画 =====
render();

</script>
</body>
</html>

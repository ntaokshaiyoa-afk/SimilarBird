<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}
.map{height:150px;}
</style>
</head>

<body>

<div id="list"></div>

<script>
const raw=new URLSearchParams(location.search).get("d");
const data=JSON.parse(LZString.decompressFromEncodedURIComponent(raw));

const list=document.getElementById("list");

function icon(c){
  if(c.t==="a") return "🎯";
  if(c.m==="car") return "🚗";
  if(c.m==="train") return "🚃";
  if(c.m==="walk") return "🚶";
}

// ===== 描画 =====
data.d[0].c.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    ${icon(c)} ${c.s}-${c.e}<br>
    ${c.tt||""}
    ${c.la?`<div id="m${i}" class="map"></div>`:""}
  `;

  list.appendChild(el);

  if(c.la) setTimeout(()=>initMap(i,c),0);
});

// ===== 地図 =====
async function initMap(i,c){
  const map=L.map("m"+i).setView([c.la,c.lo],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([c.la,c.lo]).addTo(map);

  // ルート再生成
  const prev=data.d[0].c[i-1];
  if(prev && prev.la){
    const url=`https://router.project-osrm.org/route/v1/driving/${prev.lo},${prev.la};${c.lo},${c.la}?overview=full&geometries=geojson`;
    const res=await fetch(url);
    const json=await res.json();

    const route=json.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    L.polyline(route).addTo(map);
  }
}
</script>

</body>
</html>

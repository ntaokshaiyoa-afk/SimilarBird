<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅行プラン</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.card {
  background: white;
  margin: 10px;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.header {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.details {
  margin-top: 10px;
  display: none;
}

.card.open .details {
  display: block;
}

.now {
  border: 2px solid #007aff;
}

.next-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #007aff;
  color: white;
  padding: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="list"></div>

<div id="nextBar" class="next-bar"></div>

<script>
// ===== サンプルデータ =====
const data = {
  cards: [
    {
      type: "activity",
      title: "志摩スペイン村",
      start: "08:30",
      end: "10:00",
      todos: ["パレード", "昼ごはん"],
      mapLink: "https://maps.google.com"
    },
    {
      type: "move",
      mode: "car",
      start: "10:00",
      end: "10:30",
      duration: "30分",
      navLink: "https://www.google.com/maps/dir/?api=1&destination=34.48,136.84"
    },
    {
      type: "activity",
      title: "鳥羽水族館",
      start: "10:30",
      end: "12:00",
      todos: ["ジュゴン", "ペンギン"],
      mapLink: "https://maps.google.com"
    }
  ]
};

// ===== 時刻判定 =====
function getNowIndex(cards) {
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  return cards.findIndex(c => {
    const [sh, sm] = c.start.split(":").map(Number);
    const [eh, em] = c.end.split(":").map(Number);
    const start = sh * 60 + sm;
    const end = eh * 60 + em;
    return currentMinutes >= start && currentMinutes < end;
  });
}

// ===== 描画 =====
const list = document.getElementById("list");
const nextBar = document.getElementById("nextBar");

const nowIndex = getNowIndex(data.cards);

data.cards.forEach((c, i) => {
  const el = document.createElement("div");
  el.className = "card";

  if (i === nowIndex) {
    el.classList.add("open", "now");
  }

  el.innerHTML = `
    <div class="header">
      <div>
        🕒 ${c.start} - ${c.end}<br>
        ${c.type === "move" ? "🚗 移動" : c.title}
      </div>
      <div>▶</div>
    </div>
    <div class="details">
      ${renderDetails(c)}
    </div>
  `;

  el.querySelector(".header").onclick = () => {
    el.classList.toggle("open");
  };

  list.appendChild(el);
});

// ===== 次カード表示 =====
if (nowIndex >= 0 && nowIndex < data.cards.length - 1) {
  const next = data.cards[nowIndex + 1];
  nextBar.innerHTML = `次 ▶ ${next.type === "move" ? "移動" : next.title} (${next.start})`;
}

// ===== 詳細描画 =====
function renderDetails(c) {
  if (c.type === "activity") {
    return `
      <div>
        🎯 ${c.todos.join(", ")}<br>
        <a href="${c.mapLink}" target="_blank">📍 地図</a>
      </div>
    `;
  }

  if (c.type === "move") {
    return `
      <div>
        ⏱ ${c.duration}<br>
        <a href="${c.navLink}" target="_blank">🚗 ナビ開始</a>
      </div>
    `;
  }

  return "";
}

// ===== PWA登録 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>

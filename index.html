<script>
// ===== URLからデータ取得 =====
function loadData() {
  const params = new URLSearchParams(location.search);
  const encoded = params.get("data");

  if (!encoded) return sampleData;

  try {
    const json = decodeURIComponent(atob(encoded));
    return JSON.parse(json);
  } catch (e) {
    alert("データ読み込み失敗");
    return sampleData;
  }
}

// ===== サンプル（fallback） =====
const sampleData = {
  cards: [
    {
      type: "activity",
      title: "志摩スペイン村",
      start: "08:30",
      end: "10:00",
      todos: ["パレード", "昼ごはん"],
      mapLink: "https://maps.google.com"
    }
  ]
};

const data = loadData();
</script>

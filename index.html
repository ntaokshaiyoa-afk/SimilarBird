<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}
.card{background:white;margin:10px;padding:12px;border-radius:12px;}
.map{height:150px;margin-top:10px;}
.error{color:red;padding:10px;}
</style>
</head>

<body>

<div id="list"></div>
<div id="err" class="error"></div>

<script>
// ===== 安全ロード =====
function loadData(){
  try{
    const raw=new URLSearchParams(location.search).get("d");

    if(!raw) throw "URLパラメータなし";

    const json=LZString.decompressFromEncodedURIComponent(raw);

    if(!json) throw "解凍失敗";

    const data=JSON.parse(json);

    if(!data.d) throw "構造不正";

    return data;

  }catch(e){
    err.innerText="データ読込エラー: "+e;

    // サンプル表示
    return {
      d:[{
        dt:"サンプル",
        c:[
          {
            s:"09:00",
            e:"10:00",
            tt:"鳥羽水族館",
            la:34.483,
            lo:136.843,
            m:"walk",
            cm:"- チケット購入\n- イルカショー"
          },
          {
            s:"10:30",
            e:"11:30",
            tt:"移動",
            la:34.487,
            lo:136.709,
            m:"train"
          }
        ]
      }]
    };
  }
}

const data=loadData();

// ===== 描画 =====
data.d[0].c.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <b>${c.s}-${c.e}</b><br>
    ${c.tt||""}
    ${c.cm?`<pre>${c.cm}</pre>`:""}
    ${c.la?`<div id="m${i}" class="map"></div>`:""}
  `;

  list.appendChild(el);

  if(c.la) setTimeout(()=>initMap(i,c),0);
});

// ===== 地図 =====
function initMap(i,c){
  const map=L.map(`m${i}`).setView([c.la,c.lo],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.la,c.lo]).addTo(map);
}
</script>

</body>
</html>

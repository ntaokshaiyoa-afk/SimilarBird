<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}

.tabs{
  position:sticky;top:0;background:white;
  padding:10px;z-index:1000;
}

.card{
  background:white;margin:10px;border-radius:12px;
  overflow:hidden;
}

.header{
  padding:12px;
  display:flex;justify-content:space-between;
  cursor:pointer;
}

.detail{display:none;padding:10px;}
.card.open .detail{display:block;}

.map{height:160px;margin-top:10px;z-index:0;}

.md{background:#fafafa;padding:8px;border-radius:8px;}

.transfer{color:red;font-weight:bold;}

.next{
  position:fixed;bottom:0;width:100%;
  background:#007aff;color:white;
  padding:10px;z-index:1000;
}

.spacer{height:60px;}

#debug{
  position:fixed;
  bottom:0;
  width:100%;
  max-height:120px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:10px;
  z-index:2000;
}
</style>
</head>

<body>

<div id="tabs" class="tabs"></div>
<div id="list"></div>
<div class="spacer"></div>
<div id="next" class="next"></div>
<div id="debug"></div>

<script>
// ===== LOG =====
function log(...a){
  console.log(...a);
  debug.innerText += a.join(" ")+"\n";
}

// ===== LOAD =====
function loadData(){
  try{
    const raw=new URLSearchParams(location.search).get("d");
    return JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
  }catch{
    return {d:[{dt:"サンプル",c:[]}]};
  }
}

const data=loadData();
let di=0, openIndex=null;

// ===== 路線カラー =====
const lineColor={
  "東日本旅客鉄道中央線":"orange",
  "東日本旅客鉄道武蔵野線":"red",
  "東日本旅客鉄道青梅線":"green",
  "東日本旅客鉄道京葉線":"blue"
};

// ===== 路線キャッシュ =====
const lineCache={};

async function loadLine(name){
  if(!name){
    log("❌ line missing");
    return null;
  }

  if(lineCache[name]) return lineCache[name];

  try{
    log("📥 load:",name);
    const res=await fetch(`./geojson/${name}.geojson`);

    if(!res.ok){
      log("❌ geojson not found:",name);
      return null;
    }

    const geo=await res.json();
    lineCache[name]=geo;
    return geo;

  }catch(e){
    log("❌ load error:",name,e);
    return null;
  }
}

// ===== 距離 =====
function dist(a,b){
  return (a[0]-b[0])**2+(a[1]-b[1])**2;
}

// ===== セグメント抽出（強化版） =====
function extractSegment(geo, from, to){
  let best=null, bestScore=Infinity;

  geo.features.forEach(f=>{
    let lines=[];

    if(f.geometry.type==="LineString"){
      lines=[f.geometry.coordinates];
    }else if(f.geometry.type==="MultiLineString"){
      lines=f.geometry.coordinates;
    }

    lines.forEach(line=>{
      let i1=0,i2=0,d1=Infinity,d2=Infinity;

      line.forEach((p,i)=>{
        const df=dist(p,from);
        const dt=dist(p,to);

        if(df<d1){d1=df;i1=i;}
        if(dt<d2){d2=dt;i2=i;}
      });

      const score=d1+d2;

      if(score<bestScore){
        bestScore=score;

        if(i1<i2){
          best=line.slice(i1,i2+1);
        }else{
          best=line.slice(i2,i1+1).reverse();
        }
      }
    });
  });

  log("segment:", best?.length, "score:", bestScore);
  return best;
}

// ===== タブ =====
function renderTabs(){
  tabs.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.innerText=d.dt;
    b.onclick=()=>{
      di=i;
      openIndex=null;
      render();
    };
    tabs.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card"+(i===openIndex?" open":"");

    el.innerHTML=`
      <div class="header">
        ${c.station||"未設定"}<br>
        ${c.line||"line無し"}
      </div>
      <div class="detail">
        <div id="m${i}" class="map"></div>
      </div>
    `;

    el.onclick=()=>{
      openIndex=(openIndex===i?null:i);
      render();
    };

    list.appendChild(el);

    if(i===openIndex){
      setTimeout(()=>initMap(i,c),0);
    }
  });
}

// ===== 地図 =====
async function initMap(i,c){
  log("=== initMap ===");

  const map=L.map(`m${i}`).setView([c.la||35,c.lo||139],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  if(!c.la) return;

  L.marker([c.la,c.lo]).addTo(map);

  const prev=data.d[di].c[i-1];

  if(!prev || !prev.la){
    log("no prev");
    return;
  }

  log("from:",prev.station,"to:",c.station);

  if(c.m!=="train"){
    log("not train → straight");
    L.polyline([[prev.la,prev.lo],[c.la,c.lo]],{dashArray:"6,6"}).addTo(map);
    return;
  }

  if(!c.line){
    log("❌ line name missing");
    return;
  }

  const geo=await loadLine(c.line);

  if(!geo){
    log("❌ no geo");
    return;
  }

  const seg=extractSegment(geo,[prev.lo,prev.la],[c.lo,c.la]);

  if(!seg){
    log("❌ segment not found");
    return;
  }

  const latlngs=seg.map(p=>[p[1],p[0]]);

  log("draw points:",latlngs.length);

  L.polyline(latlngs,{
    color:"red",
    weight:4
  }).addTo(map);
}

// ===== 自動スクロール =====
function autoScroll(){
  if(openIndex===null) return;

  const el=document.querySelectorAll(".card")[openIndex];
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }
}

// ===== 次予定 =====
function updateNext(){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  let nextItem=null;

  data.d[di].c.forEach(c=>{
    if(!c.s) return;
    const [h,m]=c.s.split(":");
    const t=h*60+ +m;
    if(t>=nowMin && !nextItem) nextItem=c;
  });

  next.innerText = nextItem
    ? `次: ${nextItem.s} ${nextItem.tt||nextItem.station}`
    : "予定終了";
}

// ===== 初期 =====
render();
</script>

</body>
</html>

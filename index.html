<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimilarBird</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}
.top{position:sticky;top:0;background:white;z-index:1000;padding:10px;}
.card{background:white;margin:10px;border-radius:12px;padding:12px;}
.header{display:flex;justify-content:space-between;cursor:pointer;}
.details{display:none;margin-top:10px;}
.card.open .details{display:block;}
.map{height:180px;border-radius:8px;}
.leaflet-container{z-index:0!important;}
.next-bar{position:fixed;bottom:0;width:100%;background:#007aff;color:white;padding:10px;z-index:1000;}
.good{background:#e8f5e9;} .warn{background:#fff8e1;} .bad{background:#ffebee;}
</style>
</head>

<body>

<div class="top">
  <div id="current"></div>
  <button onclick="toggleFollow()">追従</button>
  <button onclick="skip()">スキップ</button>
</div>

<div id="list"></div>
<div id="nextBar" class="next-bar"></div>

<script>
// ===== 状態 =====
let follow=false;
let userLat,userLng;
let currentIndex=0;

// ===== データ =====
const data=JSON.parse(LZString.decompressFromEncodedURIComponent(new URLSearchParams(location.search).get("d")));

// ===== 描画 =====
data.cards.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
  <div class="header">${c.start}-${c.end} ${title(c)}</div>
  <div class="details">
    ${render(c,i)}
  </div>`;

  el.querySelector(".header").onclick=()=>{
    el.classList.toggle("open");
    if(c.lat) initMap(i,c);
  };

  list.appendChild(el);
});

// ===== タイトル =====
function title(c){
  if(c.type==="move") return c.mode==="train"?"🚃":"🚗";
  return c.title;
}

// ===== 詳細 =====
function render(c,i){
  let h="";
  if(c.type==="activity") h+=c.todos?.join(",");
  if(c.mode==="train"){
    c.steps.forEach(s=>{
      h+=`<div>${s.depart}→${s.arrive} ${s.line}</div>`;
    });
  }
  if(c.lat) h+=`<div id="map-${i}" class="map"></div><div id="info-${i}"></div>`;
  return h;
}

// ===== 地図 =====
function initMap(i,c){
  const div=document.getElementById(`map-${i}`);
  if(div._map) return;

  const map=L.map(div).setView([c.lat,c.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.lat,c.lng]).addTo(map);

  if(c.route) L.polyline(c.route).addTo(map);

  div._map=map;
}

// ===== 現在地 =====
navigator.geolocation.watchPosition(pos=>{
  userLat=pos.coords.latitude;
  userLng=pos.coords.longitude;

  updateAll();
});

// ===== 更新 =====
function updateAll(){
  data.cards.forEach((c,i)=>{
    if(!c.lat) return;

    const d=dist(userLat,userLng,c.lat,c.lng);
    const dir=direction(userLat,userLng,c.lat,c.lng);

    const el=document.getElementById(`info-${i}`);
    el.innerText=`${d}km ${dir}`;

    // 到着判定
    if(d<0.2 && i===currentIndex){
      nextCard();
    }
  });
}

// ===== 次へ =====
function nextCard(){
  currentIndex++;
  document.querySelectorAll(".card")[currentIndex]?.scrollIntoView();
}

// ===== スキップ =====
function skip(){
  nextCard();
}

// ===== 距離 =====
function dist(a,b,c,d){
  return (Math.sqrt((a-c)**2+(b-d)**2)*111).toFixed(1);
}

// ===== 方角 =====
function direction(a,b,c,d){
  const dx=c-a, dy=d-b;
  if(Math.abs(dx)>Math.abs(dy)){
    return dx>0?"南":"北";
  }else{
    return dy>0?"東":"西";
  }
}

// ===== UI =====
function toggleFollow(){
  follow=!follow;
}

</script>
</body>
</html>

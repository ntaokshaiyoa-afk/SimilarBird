<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimilarBird</title>

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}

.top{
  position:sticky;top:0;background:white;padding:10px;
  border-bottom:1px solid #ddd;z-index:10;
}

.card{background:white;margin:10px;border-radius:12px;padding:12px;}
.header{display:flex;justify-content:space-between;cursor:pointer;}
.details{display:none;margin-top:10px;}
.card.open .details{display:block;}

.now{border:2px solid #007aff;}

.map{height:180px;margin-top:10px;border-radius:8px;}

.next-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#007aff;color:white;padding:10px;
}

.good{background:#e8f5e9;}
.warn{background:#fff8e1;}
.bad{background:#ffebee;}

.btn{padding:6px 10px;margin:5px;border:1px solid #ccc;border-radius:6px;}

.train-step{border-left:3px solid #007aff;padding-left:8px;margin:6px 0;}
</style>
</head>

<body>

<div class="top">
  <div id="currentTask">読み込み中...</div>
  <button class="btn" onclick="toggleFollow()">📍追従: <span id="followState">OFF</span></button>
  <button class="btn" onclick="saveParking()">🚗 駐車位置保存</button>
  <button class="btn" onclick="shareLocation()">📤 現在地共有</button>
</div>

<div id="list"></div>
<div id="nextBar" class="next-bar"></div>

<script>
// ===== 設定 =====
let follow=false;
let userLat=null,userLng=null;

// ===== データ =====
function loadData(){
  const d=new URLSearchParams(location.search).get("d");
  return d?JSON.parse(LZString.decompressFromEncodedURIComponent(d)):{cards:[]};
}
const data=loadData();

// ===== 現在 =====
function nowIndex(){
  const m=new Date().getHours()*60+new Date().getMinutes();
  return data.cards.findIndex(c=>{
    const [sh,sm]=c.start.split(":").map(Number);
    const [eh,em]=c.end.split(":").map(Number);
    return m>=sh*60+sm && m<eh*60+em;
  });
}
const idx=nowIndex();

// ===== UI =====
data.cards.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";

  if(i===idx) el.classList.add("open","now");

  el.innerHTML=`
    <div class="header">
      <div>🕒 ${c.start}-${c.end}<br>${title(c)}</div>▶
    </div>
    <div class="details">${render(c,i)}</div>
  `;

  el.querySelector(".header").onclick=()=>{
    el.classList.toggle("open");
    initMap(i,c);
  };

  list.appendChild(el);
});

// ===== 上部表示 =====
if(idx>=0){
  const c=data.cards[idx];
  currentTask.innerHTML=`▶ 今: ${title(c)}<br>${c.todos?.join(",")||""}`;
}

// ===== 次バー =====
if(idx>=0 && idx<data.cards.length-1){
  const n=data.cards[idx+1];
  nextBar.innerText=`次 ▶ ${title(n)}`;
}

// ===== タイトル =====
function title(c){
  if(c.type==="move"){
    if(c.mode==="train") return "🚃 電車";
    return "🚗 移動";
  }
  return c.title;
}

// ===== 詳細 =====
function render(c,i){
  let h="";

  if(c.type==="activity"){
    h+=`🎯 ${c.todos?.join(",")}<br>`;
  }

  if(c.type==="move"){
    if(c.mode==="car"){
      h+=`⏱ ${c.duration}<br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}" target="_blank">🚗 ナビ</a><br>`;
    }
    if(c.mode==="train"){
      h+=`🚃 乗換<br>`;
      c.steps.forEach(s=>{
        h+=`<div class="train-step">${s.depart} ${s.from}<br>↓${s.line}<br>${s.arrive} ${s.to}</div>`;
      });
      h+=`<a href="https://transit.yahoo.co.jp/" target="_blank">遅延確認</a><br>`;
    }
  }

  if(c.lat){
    h+=`<div id="map-${i}" class="map"></div>
        <div id="info-${i}"></div>`;
  }

  return h;
}

// ===== 地図（遅延生成） =====
function initMap(i,c){
  const div=document.getElementById(`map-${i}`);
  if(!div || div._map) return;

  const map=L.map(div).setView([c.lat,c.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.lat,c.lng]).addTo(map);

  if(c.route) L.polyline(c.route,{color:"blue"}).addTo(map);

  div._map=map;

  if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
      userLat=pos.coords.latitude;
      userLng=pos.coords.longitude;

      if(!map._user){
        map._user=L.circleMarker([userLat,userLng],{radius:8,color:"blue"}).addTo(map);
      }else{
        map._user.setLatLng([userLat,userLng]);
      }

      if(follow) map.setView([userLat,userLng]);

      updateInfo(i,c);
    });
  }
}

// ===== 距離・時間 =====
function updateInfo(i,c){
  if(!userLat) return;

  const d=dist(userLat,userLng,c.lat,c.lng);
  const walk=(d/5*60).toFixed(0);

  let status="good";
  if(idx>=0 && i===idx+1){
    const now=new Date();
    const [h,m]=c.start.split(":").map(Number);
    const t=new Date();t.setHours(h,m);

    const remain=(t-now)/60000;
    if(remain<walk) status="bad";
    else if(remain<walk+10) status="warn";
  }

  const el=document.getElementById(`info-${i}`);
  el.className=status;
  el.innerText=`距離:${d}km 徒歩:${walk}分`;
}

// ===== 距離計算 =====
function dist(a,b,c,d){
  return (Math.sqrt((a-c)**2+(b-d)**2)*111).toFixed(1);
}

// ===== 機能 =====
function toggleFollow(){
  follow=!follow;
  followState.innerText=follow?"ON":"OFF";
}

function saveParking(){
  if(userLat) localStorage.setItem("parking",JSON.stringify([userLat,userLng]));
  alert("保存");
}

function shareLocation(){
  if(userLat){
    const url=`https://maps.google.com/?q=${userLat},${userLng}`;
    navigator.clipboard.writeText(url);
    alert("URLコピー");
  }
}

// ===== 通知 =====
if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

setInterval(()=>{
  const n=data.cards[idx+1];
  if(!n) return;

  const now=new Date();
  const [h,m]=n.start.split(":").map(Number);
  const t=new Date();t.setHours(h,m);

  if(t-now<300000 && t-now>0){
    new Notification("出発タイミング",{body:title(n)});
  }
},60000);

</script>
</body>
</html>

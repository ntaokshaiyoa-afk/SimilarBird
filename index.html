<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimilarBird</title>

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 上部 */
.top{
  position:sticky;
  top:0;
  background:white;
  z-index:1000; /* ←重要 */
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* カード */
.card{
  background:white;
  margin:10px;
  border-radius:12px;
  padding:12px;
  position:relative;
  z-index:1;
}

.header{
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.details{
  display:none;
  margin-top:10px;
}

.card.open .details{
  display:block;
}

.now{
  border:2px solid #007aff;
}

/* 地図 */
.map{
  height:180px;
  margin-top:10px;
  border-radius:8px;
  z-index:0; /* ←重要 */
}

/* Leaflet対策 */
.leaflet-container{
  z-index:0 !important;
}

/* フッター */
.next-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#007aff;
  color:white;
  padding:10px;
  z-index:1000; /* ←重要 */
}

/* 被り防止 */
body::after{
  content:"";
  display:block;
  height:80px;
}

/* その他 */
.btn{padding:6px 10px;margin:5px;border:1px solid #ccc;border-radius:6px;}
.train-step{border-left:3px solid #007aff;padding-left:8px;margin:6px 0;}

</style>
</head>

<body>

<div class="top">
  <div id="currentTask">読み込み中...</div>
  <button class="btn" onclick="toggleFollow()">📍追従: <span id="followState">OFF</span></button>
</div>

<div id="list"></div>
<div id="nextBar" class="next-bar"></div>

<script>
// ===== 状態 =====
let follow=false;
let userLat=null,userLng=null;

// ===== データ =====
function loadData(){
  const d=new URLSearchParams(location.search).get("d");
  return d?JSON.parse(LZString.decompressFromEncodedURIComponent(d)):{cards:[]};
}
const data=loadData();

// ===== 現在 =====
function nowIndex(){
  const m=new Date().getHours()*60+new Date().getMinutes();
  return data.cards.findIndex(c=>{
    const [sh,sm]=c.start.split(":").map(Number);
    const [eh,em]=c.end.split(":").map(Number);
    return m>=sh*60+sm && m<eh*60+em;
  });
}
const idx=nowIndex();

// ===== 描画 =====
data.cards.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";

  if(i===idx) el.classList.add("open","now");

  el.innerHTML=`
    <div class="header">
      <div>🕒 ${c.start}-${c.end}<br>${title(c)}</div>▶
    </div>
    <div class="details">
      ${render(c,i)}
    </div>
  `;

  el.querySelector(".header").onclick=()=>{
    el.classList.toggle("open");

    if(el.classList.contains("open")){
      initMap(i,c);

      // ←ズレ修正
      setTimeout(()=>{
        const mapDiv=document.getElementById(`map-${i}`);
        mapDiv?._map?.invalidateSize();
      },100);
    }
  };

  list.appendChild(el);
});

// ===== 初期カードの地図を強制生成（重要） =====
setTimeout(()=>{
  if(idx>=0){
    const c=data.cards[idx];
    initMap(idx,c);

    setTimeout(()=>{
      const mapDiv=document.getElementById(`map-${idx}`);
      mapDiv?._map?.invalidateSize();
    },150);
  }
},100);

// ===== 上部 =====
if(idx>=0){
  const c=data.cards[idx];
  currentTask.innerHTML=`▶ 今: ${title(c)}`;
}

// ===== フッター =====
if(idx>=0 && idx<data.cards.length-1){
  nextBar.innerText=`次 ▶ ${title(data.cards[idx+1])}`;
}

// ===== タイトル =====
function title(c){
  if(c.type==="move"){
    return c.mode==="train"?"🚃 電車":"🚗 移動";
  }
  return c.title;
}

// ===== 詳細 =====
function render(c,i){
  let h="";

  if(c.type==="activity"){
    h+=`🎯 ${c.todos?.join(",")}<br>`;
  }

  if(c.lat){
    h+=`<div id="map-${i}" class="map"></div>`;
  }

  return h;
}

// ===== 地図 =====
function initMap(i,c){
  const div=document.getElementById(`map-${i}`);
  if(!div || div._map) return;

  const map=L.map(div).setView([c.lat,c.lng],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.lat,c.lng]).addTo(map);

  div._map=map;
}

// ===== UI =====
function toggleFollow(){
  follow=!follow;
  followState.innerText=follow?"ON":"OFF";
}

</script>

</body>
</html>

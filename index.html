<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimilarBird</title>

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.card {
  background:white;
  margin:10px;
  border-radius:12px;
  padding:12px;
}

.header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.details { display:none; margin-top:10px; }
.card.open .details { display:block; }

.now { border:2px solid #007aff; }

.map {
  height:180px;
  margin-top:10px;
  border-radius:8px;
}

.next-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#007aff;
  color:white;
  padding:10px;
}

.train-step {
  border-left:3px solid #007aff;
  padding-left:8px;
  margin:6px 0;
}
</style>
</head>

<body>

<div id="list"></div>
<div id="nextBar" class="next-bar"></div>

<script>
// ===== データ =====
function loadData() {
  const p = new URLSearchParams(location.search);
  const d = p.get("d");
  if (!d) return { cards: [] };
  return JSON.parse(LZString.decompressFromEncodedURIComponent(d));
}

const data = loadData();

// ===== 現在カード =====
function getNowIndex(cards) {
  const now = new Date();
  const m = now.getHours()*60 + now.getMinutes();
  return cards.findIndex(c=>{
    const [sh,sm]=c.start.split(":").map(Number);
    const [eh,em]=c.end.split(":").map(Number);
    return m>=sh*60+sm && m<eh*60+em;
  });
}

const nowIndex = getNowIndex(data.cards);
const list = document.getElementById("list");
const nextBar = document.getElementById("nextBar");

// ===== 描画 =====
data.cards.forEach((c,i)=>{
  const el = document.createElement("div");
  el.className = "card";

  if (i===nowIndex) el.classList.add("open","now");

  el.innerHTML = `
    <div class="header">
      <div>
        🕒 ${c.start}-${c.end}<br>
        ${title(c)}
      </div>▶
    </div>
    <div class="details">${render(c,i)}</div>
  `;

  el.querySelector(".header").onclick = ()=>{
    el.classList.toggle("open");

    const mapDiv = el.querySelector(".map");
    if (mapDiv && mapDiv._map) {
      setTimeout(()=>mapDiv._map.invalidateSize(),100);
    }
  };

  list.appendChild(el);
});

// ===== 次カード =====
if (nowIndex>=0 && nowIndex<data.cards.length-1){
  const n = data.cards[nowIndex+1];
  nextBar.innerText = `次 ▶ ${title(n)}`;
}

// ===== タイトル =====
function title(c){
  if (c.type==="move"){
    if (c.mode==="train") return "🚃 電車移動";
    return "🚗 移動";
  }
  return c.title;
}

// ===== 詳細 =====
function render(c,i){
  let html="";

  if (c.type==="activity"){
    html += `🎯 ${c.todos?.join(", ") || ""}<br>`;
  }

  if (c.type==="move"){
    if (c.mode==="car"){
      html += `⏱ ${c.duration}<br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}" target="_blank">🚗 ナビ</a><br>`;
    }

    if (c.mode==="train"){
      html += `<div>🚃 乗換案内</div>`;
      c.steps.forEach(s=>{
        html += `
        <div class="train-step">
          ${s.depart} ${s.from}<br>
          ↓ ${s.line}<br>
          ${s.arrive} ${s.to}
        </div>`;
      });
    }
  }

  if (c.lat){
    html += `<div id="map-${i}" class="map"></div>`;
  }

  return html;
}

// ===== 地図＋現在地 =====
setTimeout(()=>{
  data.cards.forEach((c,i)=>{
    if (!c.lat) return;

    const map = L.map(`map-${i}`).setView([c.lat,c.lng],13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.marker([c.lat,c.lng]).addTo(map);

    if (c.route){
      L.polyline(c.route,{color:"blue"}).addTo(map);
    }

    document.getElementById(`map-${i}`)._map = map;

    // ===== 現在地表示 =====
    if (navigator.geolocation){
      navigator.geolocation.watchPosition(pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        if (!map._userMarker){
          map._userMarker = L.circleMarker([lat,lng],{
            radius:8,
            color:"blue"
          }).addTo(map);
        } else {
          map._userMarker.setLatLng([lat,lng]);
        }

      }, ()=>{}, {
        enableHighAccuracy:true,
        maximumAge:10000,
        timeout:5000
      });
    }

  });
},100);

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}
.tabs{position:sticky;top:0;background:white;padding:10px;z-index:10;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
.map{height:150px;margin-top:10px;}
</style>
</head>

<body>

<div id="tabs" class="tabs"></div>
<div id="list"></div>

<script>
const raw=new URLSearchParams(location.search).get("d");
const data=JSON.parse(LZString.decompressFromEncodedURIComponent(raw));

let di=0;

// ===== アイコン =====
function icon(c){
  if(c.t==="a") return "🎯";
  if(c.m==="car") return "🚗";
  if(c.m==="train") return "🚃";
  if(c.m==="walk") return "🚶";
}

// ===== タブ =====
function renderTabs(){
  tabs.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.innerText=d.dt;
    b.onclick=()=>{di=i;render();}
    tabs.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  renderTabs();
  list.innerHTML="";

  const cards=data.d[di].c;

  cards.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <b>${icon(c)} ${c.s}-${c.e}</b><br>
      ${c.tt||""}
      ${c.la?`<div id="m${di}_${i}" class="map"></div>`:""}
    `;

    list.appendChild(el);

    if(c.la) setTimeout(()=>initMap(di,i,c),0);
  });
}

// ===== 地図 =====
async function initMap(di,i,c){
  const map=L.map(`m${di}_${i}`).setView([c.la,c.lo],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.la,c.lo]).addTo(map);

  const prev=data.d[di].c[i-1];
  if(prev && prev.la){
    const url=`https://router.project-osrm.org/route/v1/driving/${prev.lo},${prev.la};${c.lo},${c.la}?overview=full&geometries=geojson`;
    const res=await fetch(url);
    const json=await res.json();
    const route=json.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    L.polyline(route).addTo(map);
  }
}

render();
</script>
</body>
</html>

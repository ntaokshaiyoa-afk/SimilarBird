<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}
.card{background:white;margin:10px;padding:12px;border-radius:12px;}
.map{height:150px;margin-top:10px;}
</style>
</head>

<body>
<div id="list"></div>

<script>
const raw=new URLSearchParams(location.search).get("d");
const data=JSON.parse(LZString.decompressFromEncodedURIComponent(raw));

let stations=[];
fetch("./stations.json").then(r=>r.json()).then(s=>stations=s);

// ===== 最寄駅 =====
function nearest(lat,lng){
  let best=null,dist=999;
  stations.forEach(s=>{
    const d=(s.lat-lat)**2+(s.lng-lng)**2;
    if(d<dist){dist=d;best=s;}
  });
  return best;
}

// ===== 路線判定 =====
function guessLine(a,b){
  if(!a||!b) return null;
  return a.lines.find(l=>b.lines.includes(l));
}

// ===== 描画 =====
data.d[0].c.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="card";
  el.innerHTML=`${c.s}-${c.e} ${c.tt||""}<div id="m${i}" class="map"></div>`;
  list.appendChild(el);

  setTimeout(()=>initMap(i,c),0);
});

async function initMap(i,c){
  const map=L.map(`m${i}`).setView([c.la,c.lo],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([c.la,c.lo]).addTo(map);

  const prev=data.d[0].c[i-1];
  if(!prev) return;

  if(c.m==="train"){
    const a=nearest(prev.la,prev.lo);
    const b=nearest(c.la,c.lo);
    const line=guessLine(a,b);

    if(line){
      try{
        const geo=await fetch(`./lines/${line}.json`).then(r=>r.json());
        L.geoJSON(geo,{color:"blue"}).addTo(map);
        return;
      }catch{}
    }
  }

  // fallback
  L.polyline([[prev.la,prev.lo],[c.la,c.lo]],{dashArray:"6,6"}).addTo(map);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}
.tabs{position:sticky;top:0;background:white;padding:10px;z-index:1000;}
.card{background:white;margin:10px;border-radius:12px;overflow:hidden;}
.header{padding:12px;display:flex;justify-content:space-between;cursor:pointer;}
.detail{display:none;padding:10px;}
.card.open .detail{display:block;}
.map{height:160px;margin-top:10px;}
.md{background:#fafafa;padding:8px;border-radius:8px;}
.transfer{color:red;font-weight:bold;}
.next{position:fixed;bottom:0;width:100%;background:#007aff;color:white;padding:10px;}
.spacer{height:60px;}
</style>
</head>

<body>

<div id="tabs" class="tabs"></div>
<div id="list"></div>
<div class="spacer"></div>
<div id="next" class="next"></div>

<script>
// ===== データ =====
function loadData(){
  try{
    const raw=new URLSearchParams(location.search).get("d");
    return JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
  }catch{
    return {d:[{dt:"サンプル",c:[]}]};
  }
}

const data=loadData();
let di=0, openIndex=null;

// ===== 路線カラー =====
const lineColor={
  "東日本旅客鉄道中央線":"orange",
  "東日本旅客鉄道武蔵野線":"red",
  "東日本旅客鉄道青梅線":"green"
};

// ===== 路線キャッシュ =====
const lineCache={};

async function loadLine(name){
  if(lineCache[name]) return lineCache[name];
  try{
    const res=await fetch(`./geojson/${name}.geojson`);
    const geo=await res.json();
    lineCache[name]=geo;
    return geo;
  }catch{
    return null;
  }
}

function dist(a,b){
  return (a[0]-b[0])**2+(a[1]-b[1])**2;
}

function extractSegment(geo, from, to){
  let bestLine=null, bestScore=Infinity;

  geo.features.forEach(f=>{
    let lines=[];

    if(f.geometry.type==="LineString"){
      lines=[f.geometry.coordinates];
    }else{
      lines=f.geometry.coordinates;
    }

    lines.forEach(line=>{
      let minFrom=Infinity,minTo=Infinity;
      let idxFrom=0,idxTo=0;

      line.forEach((p,i)=>{
        const d1=dist(p,from);
        const d2=dist(p,to);
        if(d1<minFrom){minFrom=d1;idxFrom=i;}
        if(d2<minTo){minTo=d2;idxTo=i;}
      });

      const score=minFrom+minTo;

      if(score<bestScore){
        bestScore=score;

        if(idxFrom<idxTo){
          bestLine=line.slice(idxFrom,idxTo+1);
        }else{
          bestLine=line.slice(idxTo,idxFrom+1).reverse();
        }
      }
    });
  });

  return bestLine;
}

// ===== 描画 =====
function renderTabs(){
  tabs.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.innerText=d.dt;
    b.onclick=()=>{di=i;openIndex=null;render();}
    tabs.appendChild(b);
  });
}

function render(){
  renderTabs();
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const prev=data.d[di].c[i-1];

    const transfer = prev && prev.line && c.line && prev.line!==c.line;

    const el=document.createElement("div");
    el.className="card"+(i===openIndex?" open":"");

    el.innerHTML=`
      <div class="header">
        <div>
          ${c.s}-${c.e}<br>
          ${c.tt||""}
          ${transfer?'<div class="transfer">🔁 乗換</div>':""}
        </div>
        <div>${c.station||""}</div>
      </div>

      <div class="detail">
        ${c.cm?`<div class="md">${marked.parse(c.cm)}</div>`:""}
        ${c.la?`<div id="m${di}_${i}" class="map"></div>`:""}
      </div>
    `;

    el.querySelector(".header").onclick=()=>{
      openIndex=(openIndex===i?null:i);
      render();
    };

    list.appendChild(el);

    if(i===openIndex && c.la){
      setTimeout(()=>initMap(di,i,c),0);
    }
  });

  updateNext();
}

// ===== 地図 =====
async function initMap(di,i,c){
  const map=L.map(`m${di}_${i}`).setView([c.la,c.lo],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.marker([c.la,c.lo]).addTo(map);

  const prev=data.d[di].c[i-1];
  if(!prev || !prev.la) return;

  if(c.m!=="train"){
    L.polyline([[prev.la,prev.lo],[c.la,c.lo]],{
      dashArray:"6,6"
    }).addTo(map);
    return;
  }

  const geo=await loadLine(c.line);
  if(!geo) return;

  const seg=extractSegment(geo,[prev.lo,prev.la],[c.lo,c.la]);

  if(seg && seg.length>1){
    const latlngs=seg.map(p=>[p[1],p[0]]);
    const color=lineColor[c.line] || "blue";

    L.polyline(latlngs,{
      color:color,
      weight:4
    }).addTo(map);
  }
}

// ===== 次予定 =====
function updateNext(){
  next.innerText="次の予定";
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SimilarBird</title>

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.card {
  background:white;
  margin:10px;
  border-radius:12px;
  padding:12px;
}

.header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.details { display:none; margin-top:10px; }
.card.open .details { display:block; }

.now { border:2px solid #007aff; }

.map {
  height:150px;
  margin-top:10px;
  border-radius:8px;
}

.next-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#007aff;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<div id="list"></div>
<div id="nextBar" class="next-bar"></div>

<script>
// ===== データ読み込み =====
function loadData() {
  const params = new URLSearchParams(location.search);
  const compressed = params.get("d");

  if (!compressed) {
    alert("データがありません");
    return { cards: [] };
  }

  try {
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    return JSON.parse(json);
  } catch {
    alert("データ読み込み失敗");
    return { cards: [] };
  }
}

const data = loadData();

// ===== 現在判定 =====
function getNowIndex(cards) {
  const now = new Date();
  const m = now.getHours()*60 + now.getMinutes();

  return cards.findIndex(c => {
    const [sh,sm]=c.start.split(":").map(Number);
    const [eh,em]=c.end.split(":").map(Number);
    return m>=sh*60+sm && m<eh*60+em;
  });
}

const list = document.getElementById("list");
const nextBar = document.getElementById("nextBar");

const nowIndex = getNowIndex(data.cards);

// ===== 描画 =====
data.cards.forEach((c,i)=>{
  const el = document.createElement("div");
  el.className = "card";

  if (i===nowIndex) el.classList.add("open","now");

  el.innerHTML = `
    <div class="header">
      <div>
        🕒 ${c.start}-${c.end}<br>
        ${c.type==="move"?"🚗移動":c.title}
      </div>
      ▶
    </div>
    <div class="details">
      ${render(c,i)}
    </div>
  `;

el.querySelector(".header").onclick = () => {
  el.classList.toggle("open");

  if (el.classList.contains("open")) {
    const mapDiv = el.querySelector(".map");
    if (mapDiv && mapDiv._leaflet_map) {
      setTimeout(() => {
        mapDiv._leaflet_map.invalidateSize();
      }, 100);
    }
  }
};

  list.appendChild(el);
});

// ===== 次カード =====
if (nowIndex>=0 && nowIndex<data.cards.length-1){
  const next = data.cards[nowIndex+1];
  nextBar.innerText = `次 ▶ ${next.type==="move"?"移動":next.title}`;
}

// ===== 詳細 =====
function render(c,i){
  let html="";

  if (c.type==="activity"){
    html += `🎯 ${c.todos?.join(", ") || ""}<br>`;
  }

  if (c.type==="move"){
    html += `⏱ ${c.duration}<br>
    <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}" target="_blank">🚗 ナビ</a><br>`;
  }

  if (c.lat){
    html += `<div id="map-${i}" class="map"></div>`;
  }

  return html;
}

// ===== 地図 =====
setTimeout(()=>{
  data.cards.forEach((c,i)=>{
    if (!c.lat) return;

    const map = L.map(`map-${i}`).setView([c.lat,c.lng],15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      maxZoom:19
    }).addTo(map);

    L.marker([c.lat,c.lng]).addTo(map);

    // ←これ追加
    document.getElementById(`map-${i}`)._leaflet_map = map;
  });
},100);

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>

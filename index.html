<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;}

.tabs{
  position:sticky;top:0;background:white;
  padding:10px;z-index:1000;
}

.card{
  background:white;margin:10px;border-radius:12px;
  overflow:hidden;
}

.header{
  padding:12px;
  display:flex;justify-content:space-between;
  cursor:pointer;
}

.detail{display:none;padding:10px;}
.card.open .detail{display:block;}

.map{height:160px;margin-top:10px;z-index:0;}

.md{background:#fafafa;padding:8px;border-radius:8px;}

.transfer{color:red;font-weight:bold;}

.next{
  position:fixed;bottom:0;width:100%;
  background:#007aff;color:white;
  padding:10px;z-index:1000;
}

.spacer{height:60px;}

#debug{
  position:fixed;
  bottom:0;
  width:100%;
  max-height:120px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:10px;
  z-index:2000;
}
</style>
</head>

<body>

<div id="apiBox" style="
  position:fixed;
  top:10px;
  right:10px;
  z-index:3000;
  background:white;
  padding:8px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
">
  <input id="apiKeyInput" placeholder="ORS API Key" style="width:160px;">
  <button onclick="saveApiKey()">保存</button>
</div>

<div id="tabs" class="tabs"></div>
<div id="list"></div>
<div class="spacer"></div>
<div id="next" class="next"></div>
<div id="debug"></div>

<script>
// ===== LOG =====
function log(...a){
  console.log(...a);
  debug.innerText += a.join(" ")+"\n";
}

// ===== API KEY =====
function getApiKey(){
  return localStorage.getItem("ors_key");
}

function setApiKey(key){
  localStorage.setItem("ors_key", key);
}

function saveApiKey(){
  const key = apiKeyInput.value.trim();

  if(!key){
    alert("APIキーを入力してください");
    return;
  }

  setApiKey(key);
  alert("保存しました");
}

function initApiKey(){
  const urlKey = new URLSearchParams(location.search).get("key");
  const localKey = getApiKey();

  // URL優先
  if(urlKey){
    setApiKey(urlKey);
    apiKeyInput.value = urlKey;
    log("🔑 API key loaded from URL");
    return;
  }

  // localStorage
  if(localKey){
    apiKeyInput.value = localKey;
    log("🔑 API key loaded from localStorage");
    return;
  }

  // 未設定
  log("❌ API key not set");
  alert("ORS APIキーを入力してください");
}

// ===== ORS CACHE =====
const routeCache = {};

function getProfile(mode){
  switch(mode){
    case "walk": return "foot-walking";
    case "car": return "driving-car";
    case "bike": return "cycling-regular";
    default: return "foot-walking";
  }
}

async function getRouteORS(prev, curr, mode){
  const key = getApiKey();

  if(!key){
    log("❌ APIキー未設定");
    return null;
  }

  const cacheKey = `${prev.la},${prev.lo}-${curr.la},${curr.lo}-${mode}`;

  if(routeCache[cacheKey]){
    log("⚡ cache hit");
    return routeCache[cacheKey];
  }

  const profile = getProfile(mode);

  try{
    const res = await fetch(
      `https://api.openrouteservice.org/v2/directions/${profile}/geojson`,
      {
        method:"POST",
        headers:{
          "Authorization": key,
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          coordinates: [
            [prev.lo, prev.la],
            [curr.lo, curr.la]
          ]
        })
      }
    );

    if(!res.ok){
      log("❌ ORS error:", res.status);
      return null;
    }

    const geo = await res.json();

    const coordsRaw = geo.features[0].geometry.coordinates;

    // ★ 距離・時間
    const summary = geo.features[0].properties.summary;

    const distance = summary.distance; // m
    const duration = summary.duration; // sec

    // ★ 軽量化
    const coords = simplifyCoords(coordsRaw, 5) // ←ここ重要
      .map(p=>[p[1], p[0]]);

    const result = {
      coords,
      distance,
      duration
    };

    routeCache[cacheKey] = result;

    return result;

  }catch(e){
    log("❌ ORS fetch error:", e);
    return null;
  }
}

function simplifyCoords(coords, step=5){
  if(coords.length <= step) return coords;

  const result = [];

  for(let i=0; i<coords.length; i+=step){
    result.push(coords[i]);
  }

  // 最後は必ず追加
  result.push(coords[coords.length-1]);

  return result;
}

function formatDistance(m){
  if(m < 1000) return `${Math.round(m)}m`;
  return `${(m/1000).toFixed(1)}km`;
}

function formatDuration(sec){
  const min = Math.round(sec/60);

  if(min < 60) return `${min}分`;

  const h = Math.floor(min/60);
  const m = min % 60;

  return `${h}時間${m}分`;
}

// ===== LOAD =====
function loadData(){
  try{
    const raw=new URLSearchParams(location.search).get("d");
    return JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
  }catch{
    return {d:[{dt:"サンプル",c:[]}]};
  }
}

const data=loadData() || {d:[{dt:"サンプル",c:[]}]};
let di=0, openIndex=null;

// ===== 路線カラー =====
const lineColor={
  "東日本旅客鉄道中央線":"orange",
  "東日本旅客鉄道武蔵野線":"red",
  "東日本旅客鉄道青梅線":"green",
  "東日本旅客鉄道京葉線":"blue"
};

// ===== 路線キャッシュ =====
const lineCache={};

function normalizeLineName(name){
  if(!name) return null;

  return name
    .replaceAll("JR東日本", "東日本旅客鉄道")
    .replaceAll("JR", "東日本旅客鉄道")
    .replaceAll("線", "線"); // 将来拡張用
}
  
async function loadLine(name){
  if(!name){
    log("❌ line missing");
    return null;
  }

  name = normalizeLineName(name);

  if(lineCache[name]) return lineCache[name];

  try{
    log("📥 load:",name);
    const res=await fetch(`./lines/${name}.geojson`);

    if(!res.ok){
      log("❌ geojson not found:",name);
      return null;
    }

    const geo=await res.json();
    lineCache[name]=geo;
    return geo;

  }catch(e){
    log("❌ load error:",name,e);
    return null;
  }
}

// ===== 距離 =====
function dist(a,b){
  return (a[0]-b[0])**2+(a[1]-b[1])**2;
}

// ===== セグメント抽出（強化版） =====
function extractSegment(geo, from, to){
  let best=null, bestScore=Infinity;

  geo.features.forEach(f=>{
    let lines=[];

    if(f.geometry.type==="LineString"){
      lines=[f.geometry.coordinates];
    }else if(f.geometry.type==="MultiLineString"){
      lines=f.geometry.coordinates;
    }

    lines.forEach(line=>{
      let i1=0,i2=0,d1=Infinity,d2=Infinity;

      line.forEach((p,i)=>{
        const df=dist(p,from);
        const dt=dist(p,to);

        if(df<d1){d1=df;i1=i;}
        if(dt<d2){d2=dt;i2=i;}
      });

      const score=d1+d2;

      if(score<bestScore){
        bestScore=score;

        if(i1<i2){
          best=line.slice(i1,i2+1);
        }else{
          best=line.slice(i2,i1+1).reverse();
        }
      }
    });
  });

  log("segment:", best?.length, "score:", bestScore);
  return best;
}

// ===== タブ =====
function renderTabs(){
  tabs.innerHTML="";

  (data.d||[]).forEach((d,i)=>{
    const b=document.createElement("button");
    b.innerText=d.dt;
    b.onclick=()=>{
      di=i;
      openIndex=null;
      render();
    };
    tabs.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  renderTabs();
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card"+(i===openIndex?" open":"");

    el.innerHTML=`
      <div class="header">
        ${c.station||"未設定"}<br>
        ${c.line||"line無し"}
      </div>
      <div class="detail">
        <div id="m${i}" class="map"></div>
      </div>
    `;

    el.querySelector(".header").onclick=(e)=>{
      e.stopPropagation();
      openIndex=(openIndex===i?null:i);
      render();
    };

    list.appendChild(el);

    if(i===openIndex){
      setTimeout(()=>initMap(i,c),0);
    }
  });
}

// ===== 地図 =====
async function initMap(i,c){
  log("=== initMap ===");

  const map=L.map(`m${i}`,{
    dragging:true,
    tap:false,
    touchZoom:true,
    scrollWheelZoom:true
  }).setView([c.la||35,c.lo||139],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const container = map.getContainer();

  container.addEventListener("click", e=>e.stopPropagation());
  container.addEventListener("touchstart", e=>e.stopPropagation(), {passive:true});

  container.addEventListener("touchstart", ()=>lockBodyScroll(true), {passive:true});
  container.addEventListener("touchend", ()=>lockBodyScroll(false));
  container.addEventListener("touchcancel", ()=>lockBodyScroll(false));

  container.addEventListener("mousedown", ()=>lockBodyScroll(true));
  container.addEventListener("mouseup", ()=>lockBodyScroll(false));
  container.addEventListener("mouseleave", ()=>lockBodyScroll(false));

  if(!c.la) return;

  L.marker([c.la,c.lo]).addTo(map);

  const prev=data.d[di].c[i-1];

  if(!prev || !prev.la){
    log("no prev");
    return;
  }

  // =========================
  // 🚃 電車
  // =========================
  if(c.m==="train"){
    if(!c.line) c.line = prev.line;
    if(!c.line) return;

    const geo=await loadLine(c.line);
    if(!geo) return;

    const seg=extractSegment(geo,[prev.lo,prev.la],[c.lo,c.la]);
    if(!seg) return;

    const latlngs=seg.map(p=>[p[1],p[0]]);

    L.polyline(latlngs,{
      color:"red",
      weight:4
    }).addTo(map);

    return;
  }

// =========================
// 🚗 ORSルート
// =========================
const result = await getRouteORS(prev, c, c.m);

if(result){
  const {coords, distance, duration} = result;

  L.polyline(coords,{
  color:getRouteColor(c.m),
  weight:4
}).addTo(map);
  
  // ★ 情報表示
  showRouteInfo(i, distance, duration);

  log("✅ ORS route drawn");
  return;
}

  // =========================
  // fallback（直線）
  // =========================
  log("⚠ fallback line");

  L.polyline([[prev.la,prev.lo],[c.la,c.lo]],{
    dashArray:"6,6"
  }).addTo(map);
}

// ===== 地図操作中の本文スクロール抑制 =====
function lockBodyScroll(lock){
  if(lock){
    document.body.style.overflow = "hidden";
    document.body.style.touchAction = "none";
  }else{
    document.body.style.overflow = "";
    document.body.style.touchAction = "";
  }
}
  
// ===== 自動スクロール =====
function autoScroll(){
  if(openIndex===null) return;

  const el=document.querySelectorAll(".card")[openIndex];
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }
}

function showRouteInfo(index, distance, duration){
  const cards = document.querySelectorAll(".card");
  const card = cards[index];

  if(!card) return;

  let info = card.querySelector(".routeInfo");

  if(!info){
    info = document.createElement("div");
    info.className = "routeInfo";
    info.style.fontSize = "12px";
    info.style.marginTop = "4px";
    info.style.color = "#555";

    card.querySelector(".header").appendChild(info);
  }

  info.innerText =
    `${formatDistance(distance)} / ${formatDuration(duration)}`;
}

function getRouteColor(mode){
  switch(mode){
    case "walk": return "green";
    case "car": return "#007aff";
    case "bike": return "orange";
    default: return "#007aff";
  }
}

// ===== 次予定 =====
function updateNext(){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  let nextItem=null;

  data.d[di].c.forEach(c=>{
    if(!c.s) return;
    const [h,m]=c.s.split(":");
    const t=h*60+ +m;
    if(t>=nowMin && !nextItem) nextItem=c;
  });

  next.innerText = nextItem
    ? `次: ${nextItem.s} ${nextItem.tt||nextItem.station}`
    : "予定終了";
}

// ===== 初期 =====
initApiKey();
render();
</script>

</body>
</html>

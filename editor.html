<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}
.top{padding:10px;background:white;position:sticky;top:0;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);}
.modalInner{background:white;margin:10%;padding:10px;}
textarea{width:100%;height:60px;}
</style>
</head>

<body>

<div class="top">
  <button id="addDay">＋日</button>
  <button id="addBtn">＋カード</button>
  <button id="genBtn">URL生成</button>
</div>

<div id="days"></div>
<div id="list"></div>

<textarea id="urlOut"></textarea>

<div id="modal" class="modal">
  <div class="modalInner">
    <input id="title"><br>
    <input id="start"><input id="end"><br>

    <button id="saveBtn">保存</button>
    <button id="delBtn">削除</button>
    <button id="closeBtn">閉じる</button>
  </div>
</div>

<script>
// ===== 安全ラッパ =====
function safe(fn){
  try{fn();}catch(e){console.error(e);}
}

// ===== DOM =====
const addDayBtn=document.getElementById("addDay");
const addBtn=document.getElementById("addBtn");
const genBtn=document.getElementById("genBtn");

const daysEl=document.getElementById("days");
const list=document.getElementById("list");
const modal=document.getElementById("modal");

const title=document.getElementById("title");
const start=document.getElementById("start");
const end=document.getElementById("end");

const saveBtn=document.getElementById("saveBtn");
const delBtn=document.getElementById("delBtn");
const closeBtn=document.getElementById("closeBtn");

const urlOut=document.getElementById("urlOut");

// ===== 状態 =====
let data=load();
let di=0;
let editIndex=null;

// ===== 保存 =====
function save(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

function load(){
  try{
    return JSON.parse(localStorage.getItem("timeline"))
      || {d:[{dt:"1日目",c:[]}]};
  }catch{
    return {d:[{dt:"1日目",c:[]}]};
  }
}

// ===== 日描画 =====
function renderDays(){
  daysEl.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.textContent=d.dt;
    b.onclick=()=>{di=i;render();}
    daysEl.appendChild(b);
  });
}

// ===== カード描画 =====
function render(){
  safe(()=>{
    renderDays();
    list.innerHTML="";

    data.d[di].c.forEach((c,i)=>{
      const el=document.createElement("div");
      el.className="card";
      el.textContent=`${c.s} ${c.tt}`;

      el.onclick=()=>openEditor(i);

      list.appendChild(el);
    });
  });
}

// ===== ボタン =====
addDayBtn.onclick=()=>{
  data.d.push({dt:`${data.d.length+1}日目`,c:[]});
  save();
  render();
};

addBtn.onclick=()=>{
  data.d[di].c.push({s:"09:00",e:"10:00",tt:"新規"});
  save();
  render();
};

genBtn.onclick=()=>{
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  urlOut.value=location.href.split("?")[0].replace("editor","index")+"?d="+d;
};

// ===== 編集 =====
function openEditor(i){
  editIndex=i;
  const c=data.d[di].c[i];

  modal.style.display="block";

  title.value=c.tt||"";
  start.value=c.s;
  end.value=c.e;
}

saveBtn.onclick=()=>{
  const c=data.d[di].c[editIndex];

  c.tt=title.value;
  c.s=start.value;
  c.e=end.value;

  modal.style.display="none";

  save();
  render();
};

delBtn.onclick=()=>{
  data.d[di].c.splice(editIndex,1);
  modal.style.display="none";
  save();
  render();
};

closeBtn.onclick=()=>{
  modal.style.display="none";
};

// ===== 初期 =====
render();
</script>

</body>
</html>

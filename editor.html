<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<!-- ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}

.top{padding:10px;background:white;position:sticky;top:0;z-index:1000;}
.dayTabs button{margin:2px;}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  cursor:grab;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.modalInner{
  background:white;
  margin:5%;
  padding:10px;
  border-radius:10px;
}

#map{height:200px;margin-top:10px;}

.preview{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  border-top:2px solid #ccc;
}

textarea{width:100%;height:60px;}
</style>
</head>

<body>

<div class="top">
  <div class="dayTabs" id="days"></div>
  <button id="addDay">＋日</button>
  <button id="addBtn">＋カード</button>
  <button id="genBtn">URL生成</button>
</div>

<div id="list"></div>

<textarea id="urlOut"></textarea>

<!-- モーダル -->
<div id="modal" class="modal">
  <div class="modalInner">
    <input id="title" placeholder="タイトル"><br>
    <input id="start" placeholder="09:00">
    <input id="end" placeholder="10:00"><br>

    <select id="mode">
      <option value="walk">徒歩</option>
      <option value="car">車</option>
      <option value="train">電車</option>
    </select>

    <!-- 🔍 検索 -->
    <input id="search" placeholder="場所検索">
    <div id="results"></div>

    <div id="map"></div>

    <button id="saveBtn">保存</button>
    <button id="delBtn">削除</button>
    <button id="closeBtn">閉じる</button>
  </div>
</div>

<!-- プレビュー -->
<iframe id="preview" class="preview"></iframe>

<script>
// ===== 状態 =====
let data=loadLocal();
let di=0;
let editIndex=null;
let map, marker;

// ===== 保存 =====
function saveLocal(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

// ===== 読込 =====
function loadLocal(){
  return JSON.parse(localStorage.getItem("timeline")) 
    || {d:[{dt:"1日目",c:[]}]};
}

// ===== 日タブ =====
function renderDays(){
  days.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.textContent=d.dt;
    b.onclick=()=>{di=i;render();}
    days.appendChild(b);
  });
}

// ===== カード =====
function render(){
  renderDays();
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.textContent=`${c.s} ${c.tt}`;
    el.onclick=()=>openEditor(i);
    list.appendChild(el);
  });

  new Sortable(list,{
    onEnd:e=>{
      const item=data.d[di].c.splice(e.oldIndex,1)[0];
      data.d[di].c.splice(e.newIndex,0,item);
      saveLocal();
      updatePreview();
    }
  });
}

// ===== 日追加 =====
addDay.onclick=()=>{
  data.d.push({dt:`${data.d.length+1}日目`,c:[]});
  saveLocal();
  render();
};

// ===== カード追加 =====
addBtn.onclick=()=>{
  data.d[di].c.push({s:"09:00",e:"10:00",tt:"新規",m:"walk"});
  saveLocal();
  render();
};

// ===== 編集 =====
function openEditor(i){
  editIndex=i;
  const c=data.d[di].c[i];

  modal.style.display="block";

  title.value=c.tt||"";
  start.value=c.s;
  end.value=c.e;
  mode.value=c.m||"walk";

  initMap(c);
}

// ===== 地図 =====
function initMap(c){
  if(map){map.remove();}

  map=L.map("map").setView([c.la||35,c.lo||139],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  if(c.la){
    marker=L.marker([c.la,c.lo]).addTo(map);
  }

  map.on("click",e=>{
    if(marker) marker.remove();
    marker=L.marker(e.latlng).addTo(map);

    const card=data.d[di].c[editIndex];
    card.la=e.latlng.lat;
    card.lo=e.latlng.lng;
  });
}

// ===== 検索 =====
search.oninput=async ()=>{
  const q=search.value;
  if(q.length<2) return;

  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const json=await res.json();

  results.innerHTML="";
  json.slice(0,5).forEach(r=>{
    const div=document.createElement("div");
    div.textContent=r.display_name;
    div.onclick=()=>{
      map.setView([r.lat,r.lon],14);

      if(marker) marker.remove();
      marker=L.marker([r.lat,r.lon]).addTo(map);

      const card=data.d[di].c[editIndex];
      card.la=+r.lat;
      card.lo=+r.lon;
    };
    results.appendChild(div);
  });
};

// ===== 保存 =====
saveBtn.onclick=()=>{
  const c=data.d[di].c[editIndex];
  c.tt=title.value;
  c.s=start.value;
  c.e=end.value;
  c.m=mode.value;

  modal.style.display="none";

  saveLocal();
  render();
  updatePreview();
};

// ===== 削除 =====
delBtn.onclick=()=>{
  data.d[di].c.splice(editIndex,1);
  modal.style.display="none";
  saveLocal();
  render();
  updatePreview();
};

// ===== 閉じる =====
closeBtn.onclick=()=>modal.style.display="none";

// ===== URL =====
genBtn.onclick=()=>{
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  const url=location.origin+location.pathname.replace("editor","index")+"?d="+d;
  urlOut.value=url;
};

// ===== プレビュー =====
function updatePreview(){
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  preview.src=location.origin+location.pathname.replace("editor","index")+"?d="+d;
}

// ===== 初期 =====
render();
updatePreview();
</script>

</body>
</html>

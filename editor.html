<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}
.top{padding:10px;background:white;position:sticky;top:0;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);}
.modalInner{background:white;margin:10%;padding:10px;}
textarea{width:100%;height:60px;}
button{margin:3px;}
</style>
</head>

<body>

<div class="top">
  <button id="newBtn">🆕 新規作成</button>
  <button id="addDay">＋日</button>
  <button id="addCard">＋カード</button>
  <button id="genBtn">URL生成</button>
  <button id="resetBtn">⚠ 初期化</button>
</div>

<div id="days"></div>
<div id="list"></div>

<textarea id="urlOut"></textarea>

<div id="modal" class="modal">
  <div class="modalInner">
    <input id="title"><br>
    <input id="start"><input id="end"><br>

    <button id="saveBtn">保存</button>
    <button id="delBtn">削除</button>
    <button id="closeBtn">閉じる</button>
  </div>
</div>

<script>
// ===== DOM =====
const daysEl=document.getElementById("days");
const list=document.getElementById("list");

const newBtn=document.getElementById("newBtn");
const addDayBtn=document.getElementById("addDay");
const addCardBtn=document.getElementById("addCard");
const genBtn=document.getElementById("genBtn");
const resetBtn=document.getElementById("resetBtn");

const modal=document.getElementById("modal");
const title=document.getElementById("title");
const start=document.getElementById("start");
const end=document.getElementById("end");

const saveBtn=document.getElementById("saveBtn");
const delBtn=document.getElementById("delBtn");
const closeBtn=document.getElementById("closeBtn");

const urlOut=document.getElementById("urlOut");

// ===== 状態 =====
let data=load();
let di=0;
let editIndex=null;

// ===== データ =====
function createNew(){
  return {
    d:[
      {dt:"1日目",c:[]}
    ]
  };
}

// ===== 保存 =====
function save(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem("timeline"));
    return d || createNew();
  }catch{
    return createNew();
  }
}

// ===== 新規作成（重要）=====
newBtn.onclick=()=>{
  if(confirm("新規作成しますか？現在のデータは消えます")){
    data=createNew();
    di=0;
    save();
    render();
  }
};

// ===== 初期化 =====
resetBtn.onclick=()=>{
  localStorage.removeItem("timeline");
  data=createNew();
  di=0;
  render();
};

// ===== 日 =====
function renderDays(){
  daysEl.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.textContent=d.dt;
    b.onclick=()=>{di=i;render();}
    daysEl.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  renderDays();
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.textContent=`${c.s} ${c.tt}`;

    el.onclick=()=>openEditor(i);

    list.appendChild(el);
  });
}

// ===== 日追加 =====
addDayBtn.onclick=()=>{
  data.d.push({dt:`${data.d.length+1}日目`,c:[]});
  save();
  render();
};

// ===== カード追加 =====
addCardBtn.onclick=()=>{
  data.d[di].c.push({s:"09:00",e:"10:00",tt:"新規"});
  save();
  render();
};

// ===== 編集 =====
function openEditor(i){
  editIndex=i;
  const c=data.d[di].c[i];

  modal.style.display="block";

  title.value=c.tt||"";
  start.value=c.s;
  end.value=c.e;
}

// ===== 保存 =====
saveBtn.onclick=()=>{
  const c=data.d[di].c[editIndex];

  c.tt=title.value;
  c.s=start.value;
  c.e=end.value;

  modal.style.display="none";

  save();
  render();
};

// ===== 削除 =====
delBtn.onclick=()=>{
  data.d[di].c.splice(editIndex,1);

  modal.style.display="none";

  save();
  render();
};

// ===== 閉じる =====
closeBtn.onclick=()=>{
  modal.style.display="none";
};

// ===== URL（軽量）=====
genBtn.onclick=()=>{
  const compact=data.d.map(d=>({
    dt:d.dt,
    c:d.c.map(x=>[x.s,x.e,x.tt])
  }));

  const d=LZString.compressToEncodedURIComponent(JSON.stringify(compact));

  urlOut.value=location.href.split("?")[0].replace("editor","index")+"?d="+d;
};

// 初期
render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}

.top{padding:10px;background:white;position:sticky;top:0;z-index:1000;}

.card{background:white;margin:10px;padding:10px;border-radius:10px;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);}
.modalInner{background:white;margin:5%;padding:10px;border-radius:10px;}

#map{height:200px;}
.preview{position:fixed;bottom:0;width:100%;height:200px;}
</style>
</head>

<body>

<div class="top">
  <div id="days"></div>
  <button id="addDay">＋日</button>
  <button id="addBtn">＋カード</button>
  <button id="genBtn">URL生成</button>
</div>

<div id="list"></div>

<textarea id="urlOut"></textarea>

<div id="modal" class="modal">
  <div class="modalInner">
    <input id="title"><br>
    <input id="start"><input id="end"><br>
    <select id="mode">
      <option value="walk">徒歩</option>
      <option value="car">車</option>
      <option value="train">電車</option>
    </select>

    <input id="search">
    <div id="results"></div>

    <div id="map"></div>

    <button id="saveBtn">保存</button>
    <button id="delBtn">削除</button>
    <button id="closeBtn">閉じる</button>
  </div>
</div>

<iframe id="preview" class="preview"></iframe>

<script>
// ===== 初期化 =====
document.addEventListener("DOMContentLoaded",()=>{

// ===== DOM取得 =====
const daysEl=document.getElementById("days");
const list=document.getElementById("list");

const addBtn=document.getElementById("addBtn");
const addDayBtn=document.getElementById("addDay");
const genBtn=document.getElementById("genBtn");

const modal=document.getElementById("modal");
const title=document.getElementById("title");
const start=document.getElementById("start");
const end=document.getElementById("end");
const mode=document.getElementById("mode");

const search=document.getElementById("search");
const results=document.getElementById("results");

const saveBtn=document.getElementById("saveBtn");
const delBtn=document.getElementById("delBtn");
const closeBtn=document.getElementById("closeBtn");

const preview=document.getElementById("preview");

// ===== 状態 =====
let data=JSON.parse(localStorage.getItem("timeline")) || {d:[{dt:"1日目",c:[]}]};
let di=0;
let editIndex=null;
let map, marker;

// ===== 保存 =====
function save(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

// ===== 日タブ =====
function renderDays(){
  daysEl.innerHTML="";
  data.d.forEach((d,i)=>{
    const b=document.createElement("button");
    b.textContent=d.dt;
    b.onclick=()=>{di=i;render();}
    daysEl.appendChild(b);
  });
}

// ===== 描画 =====
function render(){
  renderDays();
  list.innerHTML="";

  data.d[di].c.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.textContent=`${c.s} ${c.tt}`;
    el.onclick=()=>openEditor(i);
    list.appendChild(el);
  });

  new Sortable(list,{
    onEnd:e=>{
      const item=data.d[di].c.splice(e.oldIndex,1)[0];
      data.d[di].c.splice(e.newIndex,0,item);
      save();
    }
  });

  updatePreview();
}

// ===== カード追加（修正ポイント）=====
addBtn.addEventListener("click",()=>{
  data.d[di].c.push({
    s:"09:00",
    e:"10:00",
    tt:"新規",
    m:"walk"
  });
  save();
  render();
});

// ===== 日追加 =====
addDayBtn.addEventListener("click",()=>{
  data.d.push({dt:`${data.d.length+1}日目`,c:[]});
  save();
  render();
});

// ===== 編集 =====
function openEditor(i){
  editIndex=i;
  const c=data.d[di].c[i];

  modal.style.display="block";

  title.value=c.tt||"";
  start.value=c.s;
  end.value=c.e;
  mode.value=c.m||"walk";

  initMap(c);
}

// ===== 地図 =====
function initMap(c){
  if(map){map.remove();}

  map=L.map("map").setView([c.la||35,c.lo||139],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on("click",e=>{
    if(marker) marker.remove();
    marker=L.marker(e.latlng).addTo(map);

    const card=data.d[di].c[editIndex];
    card.la=e.latlng.lat;
    card.lo=e.latlng.lng;
  });
}

// ===== 検索 =====
search.addEventListener("input", async ()=>{
  if(search.value.length<2) return;

  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${search.value}`);
  const json=await res.json();

  results.innerHTML="";
  json.slice(0,5).forEach(r=>{
    const div=document.createElement("div");
    div.textContent=r.display_name;

    div.onclick=()=>{
      map.setView([r.lat,r.lon],14);
    };

    results.appendChild(div);
  });
});

// ===== 保存 =====
saveBtn.addEventListener("click",()=>{
  const c=data.d[di].c[editIndex];
  c.tt=title.value;
  c.s=start.value;
  c.e=end.value;
  c.m=mode.value;

  modal.style.display="none";
  save();
  render();
});

// ===== 削除 =====
delBtn.addEventListener("click",()=>{
  data.d[di].c.splice(editIndex,1);
  modal.style.display="none";
  save();
  render();
});

// ===== 閉じる =====
closeBtn.addEventListener("click",()=>{
  modal.style.display="none";
});

// ===== URL =====
genBtn.addEventListener("click",()=>{
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  urlOut.value=location.origin+location.pathname.replace("editor","index")+"?d="+d;
});

// ===== プレビュー =====
function updatePreview(){
  const d=LZString.compressToEncodedURIComponent(JSON.stringify(data));
  preview.src=location.origin+location.pathname.replace("editor","index")+"?d="+d;
}

// 初期
render();

});
</script>

</body>
</html>
